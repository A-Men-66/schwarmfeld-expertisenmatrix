name: Deploy to Hetzner

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy schwarmfeld-sd
        run: |
          echo "${{ secrets.HETZNER_SSH_KEY_B64 }}" | base64 -d > /tmp/deploy_key
          chmod 600 /tmp/deploy_key
          ssh -i /tmp/deploy_key -o StrictHostKeyChecking=no root@178.104.46.6 '
            cd /var/www/schwarmfeld-sd &&
            git pull origin main &&
            npm install --production &&
            pm2 restart schwarmfeld-sd
          '
