name: Deploy to Hetzner

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy schwarmfeld-sd
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 178.104.46.6
          username: root
          key: ${{ secrets.HETZNER_SSH_KEY }}
          script: |
            cd /var/www/schwarmfeld-sd
            git pull origin main
            npm install --production
            pm2 restart schwarmfeld-sd
